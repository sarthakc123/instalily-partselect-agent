# -----------------------------------------------------------------------------
# Install guides (10)
# series_fitment_hint is included on a couple guides to power the
# "inferred" compat fallback path tested in Phase 3.
# -----------------------------------------------------------------------------
install_guides:
  - id: IG_PS11752778
    part_id: PS11752778
    difficulty: Moderate
    estimated_minutes: 45
    tools_required: "Phillips screwdriver, 1/4-inch nut driver"
    safety_warnings: >-
      Unplug the refrigerator before beginning. The ice maker can be sharp;
      wear cut-resistant gloves.
    steps: |
      1. Unplug the refrigerator from the wall outlet.
      2. Open the freezer door and locate the ice maker assembly.
      3. Disconnect the wire harness on the side of the ice maker.
      4. Remove the three mounting screws holding the ice maker bracket.
      5. Lift the ice maker out and disconnect the water tube fitting.
      6. Connect the water tube to the new ice maker.
      7. Position the new ice maker and reinstall the three screws.
      8. Reconnect the wire harness.
      9. Plug the refrigerator back in.
      10. Allow 6 to 24 hours for the ice maker to produce its first batch.
    video_url: "https://www.partselect.com/Installation/Refrigerator-Ice-Maker/"
    series_fitment_hint: "fits most Whirlpool side-by-side and french-door refrigerators"

  - id: IG_PS11743427
    part_id: PS11743427
    difficulty: Easy
    estimated_minutes: 20
    tools_required: "Phillips screwdriver, towel"
    safety_warnings: >-
      Shut off the water supply and disconnect power before beginning.
    steps: |
      1. Shut off the water supply valve to the dishwasher.
      2. Disconnect power at the breaker.
      3. Open the lower access panel under the dishwasher door.
      4. Place a towel to catch residual water.
      5. Disconnect the water line and wire harness from the old valve.
      6. Remove the two mounting screws and pull the old valve out.
      7. Install the new valve with the same two screws.
      8. Reconnect the water line and wire harness.
      9. Restore water and power. Run a short cycle to verify no leaks.
    series_fitment_hint: "fits all Whirlpool WDT78x and WDT73x dishwashers"

  - id: IG_PS3489202
    part_id: PS3489202
    difficulty: Moderate
    estimated_minutes: 40
    tools_required: "Phillips screwdriver, 1/4-inch nut driver"
    steps: |
      1. Unplug the refrigerator.
      2. Empty the freezer and remove the rear evaporator cover.
      3. Disconnect the fan motor wire harness.
      4. Remove the mounting bracket screws.
      5. Pull out the old fan motor.
      6. Install the new fan motor and bracket.
      7. Reconnect the wire harness and reinstall the evaporator cover.
      8. Plug the refrigerator back in.

  - id: IG_PS734864
    part_id: PS734864
    difficulty: Moderate
    estimated_minutes: 35
    tools_required: "1/4-inch nut driver, pliers"
    safety_warnings: >-
      Disconnect power at the breaker. The element can stay hot; let the
      dishwasher cool for at least 30 minutes before working.
    steps: |
      1. Disconnect power at the breaker.
      2. Pull the dishwasher out from under the counter.
      3. From underneath, locate the heating element terminals.
      4. Disconnect the wires from both terminals.
      5. Unscrew the retaining nuts from the bottom of the tub.
      6. Inside the dishwasher, lift the heating element out.
      7. Insert the new element and reattach the retaining nuts.
      8. Reconnect the wires.
      9. Slide the dishwasher back into place and restore power.

  - id: IG_PS11722152
    part_id: PS11722152
    difficulty: Hard
    estimated_minutes: 90
    tools_required: "Phillips screwdriver, pliers, towel, T20 Torx bit"
    safety_warnings: >-
      Shut off water and disconnect power. The pump can hold residual water.
    steps: |
      1. Shut off water and power.
      2. Pull the dishwasher out and tilt it on its back.
      3. Remove the sump cover and filter.
      4. Disconnect the wire harness and water lines from the pump.
      5. Unscrew the pump retainer ring (counter-clockwise).
      6. Lift the old pump out.
      7. Install the new pump and lock the retainer ring clockwise.
      8. Reconnect lines and wiring.
      9. Right the dishwasher, slide it back, restore service, and run a cycle.

  - id: IG_PS3406971
    part_id: PS3406971
    difficulty: Easy
    estimated_minutes: 5
    tools_required: ""
    steps: |
      1. Open the dishwasher door.
      2. Twist the upper spray arm counter-clockwise to unscrew.
      3. Thread the new spray arm clockwise until snug.
      4. Verify it spins freely.

  - id: IG_PS755856
    part_id: PS755856
    difficulty: Easy
    estimated_minutes: 25
    tools_required: "Phillips screwdriver"
    steps: |
      1. Disconnect power.
      2. Remove the lower dish rack.
      3. Unscrew the float dome inside the tub.
      4. Pull the float assembly up and disconnect the switch wires beneath.
      5. Install the new switch and float, reconnect wires.
      6. Reinstall the rack and restore power.

  - id: IG_PS429725
    part_id: PS429725
    difficulty: Moderate
    estimated_minutes: 30
    tools_required: "Phillips screwdriver"
    steps: |
      1. Unplug the refrigerator.
      2. Locate the temperature control knob inside the fresh-food section.
      3. Remove the knob and the screws holding the housing.
      4. Disconnect the thermostat sensor tube and wires.
      5. Install the new thermostat with the sensor tube oriented identically.
      6. Reattach the housing and knob.
      7. Plug the refrigerator back in.

  - id: IG_PS11756879
    part_id: PS11756879
    difficulty: Hard
    estimated_minutes: 60
    tools_required: "Phillips screwdriver, T20 Torx bit"
    safety_warnings: >-
      Disconnect power at the breaker. The control board contains
      static-sensitive components; ground yourself before handling.
    steps: |
      1. Disconnect power at the breaker.
      2. Open the dishwasher door and remove the inner door panel screws.
      3. Separate the inner panel from the outer panel.
      4. Locate the control board housing.
      5. Photograph wire positions, then disconnect each.
      6. Unscrew the board from the housing.
      7. Install the new board and reconnect wires per the photo.
      8. Reassemble the door and restore power.

  - id: IG_PS395646
    part_id: PS395646
    difficulty: Moderate
    estimated_minutes: 30
    tools_required: "Phillips screwdriver"
    safety_warnings: >-
      Disconnect power at the breaker.
    steps: |
      1. Disconnect power.
      2. Remove the inner door panel screws.
      3. Carefully separate the inner and outer door panels.
      4. Locate the door latch assembly at the top.
      5. Disconnect the wire harness and remove the mounting screws.
      6. Install the new latch with the same screws and harness.
      7. Reassemble the door and restore power.
