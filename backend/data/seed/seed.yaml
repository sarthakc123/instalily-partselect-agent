# -----------------------------------------------------------------------------
# Symptoms (10)
# -----------------------------------------------------------------------------
symptoms:
  - id: SY_ICE_MAKER_NOT_WORKING
    description: Ice maker is not making ice or producing very little ice.
    canonical_label: ice maker not working
    appliance_type: refrigerator
  - id: SY_FRIDGE_NOT_COOLING
    description: Refrigerator section is not getting cold; food is warm.
    canonical_label: refrigerator not cooling
    appliance_type: refrigerator
  - id: SY_FRIDGE_LEAKING_WATER
    description: Water is pooling under or around the refrigerator.
    canonical_label: refrigerator leaking water
    appliance_type: refrigerator
  - id: SY_FREEZER_NOT_FREEZING
    description: Freezer section is warm or items are partially thawed.
    canonical_label: freezer not freezing
    appliance_type: refrigerator
  - id: SY_DOOR_NOT_SEALING
    description: Refrigerator door does not close fully or feels loose.
    canonical_label: door not sealing
    appliance_type: refrigerator
  - id: SY_DISHWASHER_NOT_FILLING
    description: Dishwasher does not fill with water at the start of a cycle.
    canonical_label: dishwasher not filling
    appliance_type: dishwasher
  - id: SY_DISHWASHER_NOT_DRAINING
    description: Standing water remains in the dishwasher after a cycle.
    canonical_label: dishwasher not draining
    appliance_type: dishwasher
  - id: SY_DISHES_NOT_CLEANING
    description: Dishes come out dirty after a normal cycle.
    canonical_label: dishes not cleaning
    appliance_type: dishwasher
  - id: SY_DISHWASHER_LEAKING
    description: Water leaks from under or in front of the dishwasher during a cycle.
    canonical_label: dishwasher leaking
    appliance_type: dishwasher
  - id: SY_DISHWASHER_NOT_DRYING
    description: Dishes are still wet at the end of the dry cycle.
    canonical_label: dishwasher not drying
    appliance_type: dishwasher

