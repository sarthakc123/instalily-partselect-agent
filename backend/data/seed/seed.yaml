# Synthetic seed dataset for the PartSelect chat agent POC.
#
# Design notes (mirror Phase 1 of the plan):
# - 50 parts (mix refrigerator + dishwasher).
# - 20 models (mix brands: Whirlpool, GE, Samsung, LG, KitchenAid, Maytag, Bosch, Frigidaire).
# - 30+ compatibility edges (the workhorse table; check_compatibility queries this).
# - 10 symptoms (5 refrigerator, 5 dishwasher).
# - 10 install guides (key parts; powers Tool 3 in Phase 2).
# - Case-study examples present:
#     * PS11752778 = real Whirlpool refrigerator ice maker assembly.
#     * WDT780SAEM1 = real Whirlpool dishwasher model.
#   These are intentionally cross-appliance, so check_compatibility returns "no"
#   with a clear reason. The agent should notice the appliance-type mismatch and
#   explain it rather than silently saying no.
# - For positive compat tests:
#     * PS11743427 (dishwasher water inlet valve) FITS WDT780SAEM1.
#     * PS11752778 (fridge ice maker) FITS WRF555SDFZ (Whirlpool fridge).
# - series_fitment_hint on a few install guides powers the "inferred" compat path
#   that the validator will exercise later.

